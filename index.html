/* ─── HOOKS ─── */
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setInView(true); },
      { threshold }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, inView];
}

/* ─── TYPEWRITER ─── */
function Typewriter({ texts }) {
  const [idx, setIdx]   = useState(0);
  const [disp, setDisp] = useState('');
  const [del, setDel]   = useState(false);

  useEffect(() => {
    const target = texts[idx];
    let timeout;
    if (!del && disp.length < target.length) {
      timeout = setTimeout(() => setDisp(target.slice(0, disp.length + 1)), 80);
    } else if (!del && disp.length === target.length) {
      timeout = setTimeout(() => setDel(true), 1800);
    } else if (del && disp.length > 0) {
      timeout = setTimeout(() => setDisp(disp.slice(0, -1)), 45);
    } else {
      setDel(false);
      setIdx((idx + 1) % texts.length);
    }
    return () => clearTimeout(timeout);
  }, [disp, del, idx, texts]);

  return (
    <span className="gradient-text font-display font-bold">
      {disp}<span className="blink text-purple-400">|</span>
    </span>
  );
}

                {/* Card */}
                <div className="md:w-1/2 md:px-8">
                  <div className={`glass rounded-2xl p-6 card-hover relative overflow-hidden`}>
                    <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${h.color}`} />

                    <div className="flex items-center gap-3 mb-3">
                      <span className="text-2xl">{h.icon}</span>
                      <div>
                        <span className="text-xs font-semibold text-gray-400 tracking-widest uppercase">{h.year}</span>
                        <h3 className="font-display font-bold text-white text-lg leading-tight">{h.role}</h3>

                    <p className="text-gray-500 text-xs mt-0.5 flex items-center gap-1">

                  </div>
                </div>

            ))}
          </div>
        </div>
      </div>
    </section>

}

/* ─── CONTACT ─── */
function Contact() {
  const [ref, inView] = useInView();
  const [sent, setSent] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    setSent(true);
    setTimeout(() => setSent(false), 3000);
  };

  return (
    <section id="contact" ref={ref} className="py-24 px-4">
      <div className="max-w-5xl mx-auto">
        <div className={`text-center mb-16 ${inView ? 'animate-fade-in-up' : 'opacity-0'}`}>
          <p className="text-accent font-semibold text-sm tracking-widest uppercase mb-2">Let's Connect</p>
          <h2 className="font-display font-bold text-4xl md:text-5xl text-white">
            Get In <span className="gradient-text">Touch</span>
          </h2>
          <p className="text-gray-400 mt-4 max-w-md mx-auto text-sm">
            Have an opportunity or just want to say hello? I'd love to hear from you.
          </p>
        </div>

        <div className="grid md:grid-cols-2 gap-10">
          {/* Contact info */}
          <div className={`${inView ? 'animate-fade-in-up stagger-2' : 'opacity-0'} space-y-6`}>
            {[
              { icon:'📧', label:'Email',    val:'jwsmith@colostate.edu' },
              { icon:'📍', label:'Location', val:'2002 Front Range Way, Fort Collins, CO 80525' },
              { icon:'🎓', label:'Education','val':'University of Arkansas at Little Rock' },
            ].map(c => (
              <div key={c.label} className="flex items-start gap-4 glass rounded-2xl p-5 card-hover">
                <span className="text-2xl mt-0.5">{c.icon}</span>
                <div>
                  <p className="text-gray-500 text-xs uppercase tracking-widest mb-0.5">{c.label}</p>
                  <p className="text-white text-sm font-medium">{c.val}</p>
                </div>
              </div>
            ))}
          </div>

          {/* Contact form */}
          <div className={`${inView ? 'animate-fade-in-up stagger-3' : 'opacity-0'}`}>
            <form onSubmit={handleSubmit} className="glass rounded-3xl p-8 space-y-4">
              <div>
                <label className="text-gray-400 text-xs uppercase tracking-widest block mb-2">Your Name</label>
                <input required type="text" placeholder="John Doe"
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3
                    text-white text-sm placeholder-gray-600 focus:outline-none
                    focus:border-primary/50 transition-colors" />
              </div>
              <div>
                <label className="text-gray-400 text-xs uppercase tracking-widest block mb-2">Email</label>
                <input required type="email" placeholder="you@example.com"
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3
                    text-white text-sm placeholder-gray-600 focus:outline-none
                    focus:border-primary/50 transition-colors" />
              </div>
              <div>
                <label className="text-gray-400 text-xs uppercase tracking-widest block mb-2">Message</label>
                <textarea required rows="4" placeholder="Your message..."
                  className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3
                    text-white text-sm placeholder-gray-600 focus:outline-none
                    focus:border-primary/50 transition-colors resize-none" />
              </div>
              <button type="submit"
                className={`w-full py-3.5 rounded-xl font-semibold text-white transition-all
                  ${sent
                    ? 'bg-green-500 scale-95'
                    : 'bg-gradient-to-r from-primary to-secondary hover:opacity-90 hover:scale-[1.02] hover:shadow-lg hover:shadow-purple-500/30'
                  }`}>
                {sent ? '✓ Message Sent!' : 'Send Message'}
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  );
}
